version: '3.8'

services:
  # Backend API (Express + Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${V360_POSTGRES_USER:-vahan360}:${V360_POSTGRES_PASSWORD:-pass123}@postgres:5432/${V360_POSTGRES_DB:-vahan360}
      # Set JWT_SECRET in a .env file next to this compose file (min 32 chars). See backend/.env.example
      - JWT_SECRET=${JWT_SECRET}
      - SCRAPING_MODE=live
      - SCRAPING_URL=https://khanansoft.bihar.gov.in/portal/CitizenRpt/epassreportAllDist.aspx
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spybot-network
    restart: unless-stopped

  # Dedicated Postgres for Vahan360.
  postgres:
    image: postgres:15-alpine
    container_name: vahan360-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${V360_POSTGRES_USER:-vahan360}
      POSTGRES_PASSWORD: ${V360_POSTGRES_PASSWORD:-pass123}
      POSTGRES_DB: ${V360_POSTGRES_DB:-vahan360}
      # Enforce password auth (SCRAM) for host connections on new data dirs — do not use trust in production
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - vahan360_pg_data:/var/lib/postgresql/data
    networks:
      - spybot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Frontend disabled - static UI via nginx
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports: []
  #   environment:
  #     - NODE_ENV=production
  #   depends_on:
  #     - backend
  #   networks:
  #     - spybot-network
  #   restart: unless-stopped

  # MongoDB disabled - use live Atlas
  # mongo:
  #   image: mongo:7.0
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=admin
  #     - MONGO_INITDB_ROOT_PASSWORD=password
  #     - MONGO_INITDB_DATABASE=spybot
  #   volumes:
  #     - mongo_data:/data/db
  #     - ./mongo-init:/docker-entrypoint-initdb.d
  #   networks:
  #     - spybot-network
  #   restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - spybot-network
    restart: unless-stopped

volumes:
  mongo_data:
  vahan360_pg_data:

networks:
  spybot-network:
    driver: bridge