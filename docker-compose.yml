services:
  # Express control-plane API (Node.js)
  api-express:
    build:
      context: .
      dockerfile: apps/api-express/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${V360_POSTGRES_USER:-vahan360}:${V360_POSTGRES_PASSWORD:-pass123}@postgres:5432/${V360_POSTGRES_DB:-vahan360}
      # Set JWT_SECRET in a .env file next to this compose file (min 32 chars). See apps/api-express/.env.example
      - JWT_SECRET=${JWT_SECRET}
      - SCRAPING_MODE=live
      - SCRAPING_URL=https://khanansoft.bihar.gov.in/portal/CitizenRpt/epassreportAllDist.aspx
      # Same Redis service for BullMQ + optional cache (see apps/api-express .env.example)
      - REDIS_URL=redis://redis:6379
      - BULLMQ_REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vahan360-network
    restart: unless-stopped

  # Next.js UI (same stack as api-express; nginx serves `/` → web, `/api/` → api-express).
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - HOST=0.0.0.0
    depends_on:
      api-express:
        condition: service_healthy
    networks:
      - vahan360-network
    restart: unless-stopped

  # Dedicated Postgres for Vahan360.
  postgres:
    image: postgres:15-alpine
    container_name: vahan360-postgres
    restart: unless-stopped
    # 15432: avoid clash when host PostgreSQL already uses 5432/5433 (common Windows dev).
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: ${V360_POSTGRES_USER:-vahan360}
      POSTGRES_PASSWORD: ${V360_POSTGRES_PASSWORD:-pass123}
      POSTGRES_DB: ${V360_POSTGRES_DB:-vahan360}
      # Enforce password auth (SCRAM) for host connections on new data dirs - do not use trust in production
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - vahan360_pg_data:/var/lib/postgresql/data
    networks:
      - vahan360-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vahan360-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - vahan360-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api-express:
        condition: service_healthy
      # Do not gate nginx on web "healthy" — Next can be slow to bind; libc6-compat + image HEALTHCHECK still apply to web.
      web:
        condition: service_started
    networks:
      - vahan360-network
    restart: unless-stopped

  # Profile `obs`: Prometheus + Grafana (see README). Does not include Loki to keep footprint small.
  prometheus:
    image: prom/prometheus:v2.53.1
    profiles: ["obs"]
    ports:
      - "9090:9090"
    volumes:
      # Whole tree so rule_files (rules/*.yml) resolve beside prometheus.yml
      - ./deploy/prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - vahan360-network

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["obs"]
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - vahan360-network

  # Profile `obs-loki`: Loki + Promtail (Docker log shipping). Use with Docker Desktop Linux engine.
  loki:
    image: grafana/loki:2.9.8
    profiles: ["obs-loki"]
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - vahan360_loki_data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    networks:
      - vahan360-network

  promtail:
    image: grafana/promtail:2.9.8
    profiles: ["obs-loki"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - vahan360_promtail_positions:/tmp
    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki
    networks:
      - vahan360-network

volumes:
  vahan360_pg_data:
  vahan360_loki_data:
  vahan360_promtail_positions:

networks:
  vahan360-network:
    driver: bridge
