# Deploy to VPS over SSH (Option A). Configure GitHub repo Secrets — see docs/DEPLOY_VPS_WORKFLOW.md §8.
name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — git pull + docker compose rebuild
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          # SSH TCP connect + remote script (docker build can be slow)
          timeout: 2m
          command_timeout: 30m
          script: |
            set -e
            cd /opt/vahan360
            git config --global --add safe.directory /opt/vahan360 || true
            git pull origin main
            docker compose up -d --build
            docker compose run --rm backend npx prisma db push
            docker compose run --rm backend npm run sync:user
            docker compose ps
            curl -sS http://127.0.0.1:3001/api/health/pg || true
