<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpyBot Testing</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #05070a;
        color: #ffffff;
        font-family: Inter, Arial, sans-serif;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 300px 1fr;
      }

      .sidebar {
        border-right: 1px solid #1f2937;
        background: #080c12;
        padding: 26px 20px;
      }

      .brand {
        color: #1684ff;
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 34px;
      }

      .nav-title {
        color: #a3a3a3;
        font-weight: 700;
        margin: 18px 0 10px;
      }

      .nav-item {
        display: block;
        width: 100%;
        color: #d1d5db;
        text-decoration: none;
        padding: 12px 14px;
        border-radius: 8px;
        margin-bottom: 6px;
      }

      .nav-item.active,
      .nav-item:hover {
        background: #111827;
        color: #ffffff;
      }

      main {
        padding: 42px 50px;
      }

      .breadcrumb {
        color: #93c5fd;
        margin-bottom: 26px;
        font-size: 18px;
      }

      h1 {
        margin: 0 0 28px;
        font-size: 34px;
      }

      .panel {
        border: 1px solid #1f2937;
        background: #0b0f16;
        border-radius: 8px;
        padding: 28px;
        max-width: 760px;
      }

      .label {
        color: #9ca3af;
        margin-bottom: 12px;
      }

      .message {
        font-size: 34px;
        font-weight: 800;
      }

      .status {
        color: #9ca3af;
        margin-top: 18px;
      }

      .error {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">SpyBot</div>
        <div class="nav-title">Vehicle Management</div>
        <a class="nav-item" href="/dashboard/leads">Leads</a>
        <a class="nav-item" href="/dashboard/pipeline">Pipeline</a>
        <a class="nav-item" href="/dashboard/failed-vechiles">Failed Vechiles</a>
        <a class="nav-item active" href="/dashboard/testing">Testing</a>
        <div class="nav-title">Khanan Soft</div>
        <a class="nav-item" href="/dashboard/khanansoft">Khanan Soft</a>
      </aside>
      <main>
        <div class="breadcrumb">Dashboard / Testing</div>
        <h1>Testing</h1>
        <section class="panel">
          <div class="label">Backend response</div>
          <div id="message" class="message">Loading from backend...</div>
          <div id="status" class="status">Calling http://localhost:8081/api/testing</div>
        </section>
      </main>
    </div>

    <script>
      fetch("http://localhost:8081/api/testing")
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("message").textContent = data.message || "No message received";
          document.getElementById("status").textContent = "Frontend and backend are connected locally.";
        })
        .catch((error) => {
          document.getElementById("message").textContent = "Backend request failed";
          const status = document.getElementById("status");
          status.className = "status error";
          status.textContent = error.message || "Unable to call backend";
        });
    </script>
  </body>
</html>
