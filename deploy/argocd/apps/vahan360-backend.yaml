apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vahan360-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EDUNEX-OFFICIAL/Vahan360.git
    targetRevision: main
    path: deploy/helm/vahan360
    helm:
      valueFiles:
        - ../../argocd/values/backend.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vahan360-backend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
