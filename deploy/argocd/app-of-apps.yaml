apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vahan360-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EDUNEX-OFFICIAL/Vahan360.git
    targetRevision: main
    path: deploy/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
