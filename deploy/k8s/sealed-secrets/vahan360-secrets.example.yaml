# =============================================================================
# Sealed Secrets example for Vahan360
# =============================================================================
# See also: `external-secret.placeholder.yaml` (External Secrets Operator stub).
# Prerequisites:
#   1. Install the Sealed Secrets controller in your cluster:
#        helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#        helm upgrade --install sealed-secrets sealed-secrets/sealed-secrets \
#          --namespace kube-system --set fullnameOverride=sealed-secrets-controller
#
#   2. Install the `kubeseal` CLI:
#        brew install kubeseal          # macOS
#        or download from github.com/bitnami-labs/sealed-secrets/releases
#
# Usage — seal a plain Secret into this SealedSecret:
#   kubectl create secret generic vahan360-vahan360-secrets \
#     --namespace vahan360 --dry-run=client \
#     --from-literal=DATABASE_URL="postgresql://user:pass@host:5432/db" \
#     --from-literal=INGEST_DATABASE_URL="postgresql://user:pass@host:5432/ingest" \
#     --from-literal=INGEST_DATABASE_URL_READ_REPLICA="postgresql://readonly:pass@replica:5432/ingest" \
#     --from-literal=REDIS_URL="redis://:pass@redis:6379/0" \
#     --from-literal=JWT_SECRET="<random-256-bit-hex>" \
#     --from-literal=OTEL_EXPORTER_OTLP_HEADERS="Authorization=Bearer <token>" \
#   | kubeseal --controller-name=sealed-secrets-controller \
#              --controller-namespace=kube-system \
#              --format yaml > deploy/k8s/sealed-secrets/vahan360-secrets.yaml
#
# Commit vahan360-secrets.yaml (NOT the plain Secret) and apply it:
#   kubectl apply -f deploy/k8s/sealed-secrets/vahan360-secrets.yaml
#
# The controller decrypts it into a regular Secret named
# `vahan360-vahan360-secrets` in the `vahan360` namespace.
# The Helm chart reads it via `secrets.existingSecret: vahan360-vahan360-secrets`.
# =============================================================================
#
# This is an EXAMPLE STUB — encrypted values (encryptedData) are cluster-specific
# and must be re-sealed per cluster with `kubeseal`.  Never commit real plaintext.
#
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: vahan360-vahan360-secrets
  namespace: vahan360
  annotations:
    # sealedsecrets.bitnami.com/namespace-wide: "true"   # allow any release name in ns
    # sealedsecrets.bitnami.com/cluster-wide: "true"     # allow any ns (use sparingly)
spec:
  encryptedData:
    # ── Replace each value with the output of kubeseal for your cluster ──────
    DATABASE_URL: REPLACE_WITH_KUBESEAL_OUTPUT
    INGEST_DATABASE_URL: REPLACE_WITH_KUBESEAL_OUTPUT
    # Optional read replica (see secrets.keys.ingestDatabaseUrlRead in values.yaml).
    INGEST_DATABASE_URL_READ_REPLICA: REPLACE_WITH_KUBESEAL_OUTPUT
    REDIS_URL: REPLACE_WITH_KUBESEAL_OUTPUT
    JWT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
    # Optional OTEL bearer header; omit key entirely to skip.
    OTEL_EXPORTER_OTLP_HEADERS: REPLACE_WITH_KUBESEAL_OUTPUT
    # Optional distributed browser-manager bearer token.
    BROWSER_MANAGER_TOKEN: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: vahan360-vahan360-secrets
      namespace: vahan360
    type: Opaque
