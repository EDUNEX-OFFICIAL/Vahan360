# =============================================================================
# External Secrets Operator — placeholder (replace RemoteRef / ClusterSecretStore names).
# =============================================================================
# Use when option **C** in `deploy/helm/vahan360/values.yaml` (`secrets` comment block).
#
# 1. Install ESO + configure a ClusterSecretStore / SecretStore pointed at your KMS.
# 2. Replace `PLACEHOLDER_STORE` and remote keys below.
# 3. Apply this CR; ESO materializes a Kubernetes Secret — set Helm
#    `secrets.existingSecret` to that Secret name (or rely on default naming).
#
# This file is **documentation-as-code** — do not put plaintext secrets here.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vahan360-core-secrets-placeholder
  namespace: vahan360
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: PLACEHOLDER_STORE
    kind: ClusterSecretStore
  target:
    name: vahan360-vahan360-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: vahan360/databaseUrl
    - secretKey: INGEST_DATABASE_URL
      remoteRef:
        key: vahan360/ingestDatabaseUrl
    - secretKey: INGEST_DATABASE_URL_READ_REPLICA
      remoteRef:
        key: vahan360/ingestDatabaseUrlReadReplica
    - secretKey: REDIS_URL
      remoteRef:
        key: vahan360/redisUrl
    - secretKey: JWT_SECRET
      remoteRef:
        key: vahan360/jwtSecret
