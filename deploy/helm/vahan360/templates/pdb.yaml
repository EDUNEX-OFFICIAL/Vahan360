{{- if .Values.pdb.enabled }}
{{- if and .Values.api.enabled .Values.pdb.api.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vahan360.fullname" . }}-api
  labels:
    {{- include "vahan360.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.api.minAvailable }}
  selector:
    matchLabels:
      {{- include "vahan360.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
{{- if and .Values.worker.enabled .Values.pdb.worker.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vahan360.fullname" . }}-worker
