{{- if .Values.workerRetry.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vahan360.fullname" . }}-worker-retry
  labels:
    {{- include "vahan360.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-retry
spec:
  replicas: {{ .Values.workerRetry.replicaCount }}
  selector:
    matchLabels:
      {{- include "vahan360.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-retry
  template:
    metadata:
      labels:
        {{- include "vahan360.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-retry
      {{- with .Values.workerRetry.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.workerRetry.terminationGracePeriodSeconds | default 75 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker-retry
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          ports:
            - name: noop
              containerPort: 5555
          envFrom:
            - configMapRef:
                name: {{ include "vahan360.fullname" . }}-config
            - secretRef:
                name: {{ include "vahan360.secretName" . }}
          env:
            - name: INGEST_MAIN_WORKERS_ENABLED
              value: "false"
            - name: INGEST_RETRY_WORKER_ENABLED
              value: "true"
            - name: INGEST_RETRY_WORKER_CONCURRENCY
              value: {{ .Values.workerRetry.concurrency | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahan360.secretName" . }}
                  key: {{ include "vahan360.dbUrlSecretKey" . }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahan360.secretName" . }}
                  key: {{ .Values.secrets.keys.otelHeaders }}
                  optional: true
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: {{ include "vahan360.redisUrl" . | quote }}
            - name: BULLMQ_REDIS_URL
              value: {{ include "vahan360.redisUrl" . | quote }}
            {{- else }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahan360.secretName" . }}
                  key: {{ .Values.secrets.keys.redisUrl }}
                  optional: true
            - name: BULLMQ_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahan360.secretName" . }}
                  key: {{ .Values.secrets.keys.redisUrl }}
                  optional: true
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.workerRetry.lifecycle.preStopSleepSeconds | default 20 }}"]
          {{- with .Values.workerRetry.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workerRetry.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workerRetry.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
