# Standalone observability stack (Prometheus + Grafana, optional Loki + Promtail).
# From repo root (paths below are relative to this file = deploy/compose/):
#   docker compose -f deploy/compose/observability.docker-compose.yml up -d
#
# Prometheus scrapes the backend at host.docker.internal when METRICS_ENABLED=true
# (or use extra_hosts / same user-defined network as the main stack).
#
# Loki + Promtail (Docker log shipping):
#   docker compose -f deploy/compose/observability.docker-compose.yml --profile obs-loki up -d loki promtail
#
# Jaeger all-in-one (OTLP HTTP 4318, UI 16686) — no separate collector needed for dev:
#   docker compose -f deploy/compose/observability.docker-compose.yml --profile obs-otel up -d jaeger
# Then set OTEL_ENABLED=true, OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4318 on apps/api-express/worker.

networks:
  observability:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:v2.53.1
    ports:
      - "9090:9090"
    volumes:
      # Mount full tree so rule_files (rules/*.yml) resolve beside prometheus.yml
      - ../prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - observability

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ../prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Mount secret files (ops_webhook_url, critical_webhook_url, smtp_password) in real envs.
      # - ../prometheus/secrets:/etc/alertmanager/secrets:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - observability

  loki:
    image: grafana/loki:2.9.8
    profiles: ["obs-loki"]
    ports:
      - "3100:3100"
    volumes:
      - ../loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.8
    profiles: ["obs-loki"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/tmp
    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki
    networks:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:1.60
    profiles: ["obs-otel"]
    ports:
      - "16686:16686"
      - "4318:4318"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - observability

volumes:
  loki_data:
  promtail_positions:
